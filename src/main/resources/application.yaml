spring:
  application:
    name: bytesMenu

  datasource:
    url: jdbc:mysql://localhost:3306/bytesmenu
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
    ddl-auto: update
    show-sql: true
    open-in-view: false

    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect